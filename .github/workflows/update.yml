name: Update World Cup scores

# Runs on GitHub's servers — no laptop needed. Updates ~every 30 minutes.
on:
  schedule:
    - cron: "13,43 * * * *"   # twice an hour (UTC); GitHub may delay under load
  workflow_dispatch: {}        # lets you trigger it manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate data.json
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python3 update_scores.py

      - name: Commit & push if the scores changed
        run: |
          if [ -n "$(git status --porcelain data.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "chore: update World Cup scores [skip ci]"
            git push
          else
            echo "No score changes."
          fi
