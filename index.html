  <div class="wrap">

<script>
const FACTS = [
  "2026 is the first 48-team World Cup — and the first hosted by three nations: the USA, Canada and Mexico.",
  "Brazil are the only side to have played in every World Cup, and hold the most titles with five.",
  "Just Fontaine's 13 goals at the 1958 World Cup is still the most ever in a single tournament.",
  "Miroslav Klose is the all-time top World Cup scorer with 16 goals across four tournaments.",
  "The fastest World Cup goal was scored by Hakan Şükür for Turkey in 2002 — after just 11 seconds.",
  "Germany 7–1 Brazil at the 2014 semi-final is the most lopsided result that late in a World Cup.",
  "The highest-scoring World Cup match was Austria 7–5 Switzerland in 1954 — twelve goals.",
  "Only eight different nations have ever won the World Cup.",
  "The trophy is solid 18-carat gold and weighs a little over 6 kilograms.",
  "In 1950's 'Maracanazo', Uruguay stunned Brazil in front of a crowd of roughly 200,000.",
];

function fmtParts(iso) {
  if (!iso) return { wd:"", dm:"", tm:"" };
  const d = new Date(iso);
  return {
    wd: d.toLocaleDateString(undefined, { weekday:"short" }),
    dm: d.toLocaleDateString(undefined, { day:"numeric", month:"short" }),
    tm: d.toLocaleTimeString(undefined, { hour:"2-digit", minute:"2-digit" }),
  };
}
function crestImg(url, tla, cls) {
  if (url) return `<img class="${cls}" src="${url}" alt="${tla||''}" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'${cls} txt',textContent:'${tla||''}'}))">`;
  return `<span class="${cls} txt">${tla||""}</span>`;
}
function prettyStage(stage, group) {
  if (group) return group.replace("GROUP_", "Group ");
  const map = { LAST_32:"Round of 32", LAST_16:"Round of 16", ROUND_OF_16:"Round of 16",
    QUARTER_FINALS:"Quarter-final", SEMI_FINALS:"Semi-final", THIRD_PLACE:"3rd place", FINAL:"Final" };
  if (!stage) return "";
  return map[stage] || stage.replace(/_/g," ").toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}
function ordinal(n) {
  if (n == null) return "";
  const s = ["th", "st", "nd", "rd"], v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

/* ---- Top cluster ---- */
function vibe(lead, diff) {
  if (!lead) return "Dead heat — it's anyone's cup! 🤝";
  const n = lead.name;
  if (diff >= 10) return `${n} is running away with it 🏃💨`;
  if (diff >= 6) return `${n} is cruising 😎`;
  if (diff >= 3) return `${n} pulls ahead 🔥`;
  return `${n} noses in front — squeaky tight 😬`;
}
function towHtml(a, b) {
  const aP = Math.max(a.total, 0), bP = Math.max(b.total, 0);
  let split = (aP + bP) > 0 ? (aP / (aP + bP)) * 100 : 50;
  split = Math.max(12, Math.min(88, split));
  return `<div class="tow">
    <div class="bar"><div class="fill" style="width:${split}%"></div><div class="mid"></div></div>
    <div class="ends"><span class="n">${a.name} ${a.total > 0 ? "+" : ""}${a.total}</span><span class="d">${b.name} ${b.total > 0 ? "+" : ""}${b.total}</span></div>
  </div>`;
}
function tapeRow(label, nv, dv, betterHigh) {
  let l = "v l", r = "v r";
  if (betterHigh === null) { l += " dim"; r += " dim"; }
  else if (nv !== dv) {
    if ((betterHigh && nv > dv) || (!betterHigh && nv < dv)) l += " win-l"; else r += " win-r";
  }
  return `<div class="row"><span class="${l}">${nv}</span><span class="lbl">${label}</span><span class="${r}">${dv}</span></div>`;
}
function tapeHtml(a, b) {
  const A = a.agg || {}, B = b.agg || {};
  return `<div class="tape">
    <div class="row head"><span class="v l">${a.name}</span><span class="lbl">head-to-head</span><span class="v r">${b.name}</span></div>
    ${tapeRow("Played", A.played || 0, B.played || 0, null)}
    ${tapeRow("Wins", A.w || 0, B.w || 0, true)}
    ${tapeRow("Draws", A.d || 0, B.d || 0, null)}
    ${tapeRow("Losses", A.l || 0, B.l || 0, false)}
    ${tapeRow("Goals for", A.gf || 0, B.gf || 0, true)}
    ${tapeRow("Goals against", A.ga || 0, B.ga || 0, false)}
  </div>`;
}

/* ---- Standings ---- */
function resultChips(t) {
  const played = (t.matches || []).filter(m => m.counted);
  if (!played.length) return `<span class="rchip none">—</span>`;
  return played.map(m => {
    const word = m.result === "W" ? "Won" : m.result === "D" ? "Drew" : "Lost";
    return `<span class="rchip ${m.result}" title="${word} ${m.goalsFor}–${m.goalsAgainst} vs ${m.opponent}">${m.goalsFor}-${m.goalsAgainst}</span>`;
  }).join("");
}
function teamCard(t) {
  const cls = t.points > 0 ? "pos" : (t.points < 0 ? "neg" : "zero");
  const g = t.group, c = t.coach, bits = [];
  if (g && g.position) bits.push(`${ordinal(g.position)} in ${g.group}`);
  if (c && c.name) bits.push(`👔 ${c.name.split(" ").slice(-1)[0]}`);
  const meta = bits.length ? `<div class="team-meta">${bits.join("  ·  ")}</div>` : "";
  return `<div class="team"><div class="team-head">
    ${crestImg(t.crest, t.tla, "crest")}
    <div class="team-name">${t.name}</div>
    <span class="record" title="W-L-D: ${t.w} won, ${t.l} lost, ${t.d} drawn">${t.w}-${t.l}-${t.d}</span>
    <div class="pts-badge ${cls}">${t.points > 0 ? "+" : ""}${t.points}</div>
  </div>${meta}</div>`;
}
function panel(p, key) {
  return `<section class="panel ${key}">
    <h3><span class="nm">${p.name}</span><span class="tot">${p.total > 0 ? "+" : ""}${p.total} pts</span></h3>
    ${p.teams.map(teamCard).join("")}
  </section>`;
}

/* ---- Lead tracker ---- */
function leadChart(tl, aName, bName) {
  if (!tl || tl.length < 2) return "";
  const W = 760, H = 200, pad = 26;
  const vals = tl.flatMap(p => [p.n, p.d]);
  const maxV = Math.max(1, ...vals), minV = Math.min(0, ...vals);
  const X = i => pad + (i / (tl.length - 1)) * (W - 2 * pad);
  const Y = v => pad + (1 - (v - minV) / (maxV - minV)) * (H - 2 * pad);
  const path = k => tl.map((p, i) => `${i ? "L" : "M"}${X(i).toFixed(1)} ${Y(p[k]).toFixed(1)}`).join(" ");
  const dots = k => tl.map((p, i) => `<circle cx="${X(i).toFixed(1)}" cy="${Y(p[k]).toFixed(1)}" r="3" class="pt ${k}"/>`).join("");
  return `<section class="block"><h2 class="sec"><span class="ico">📈</span> Lead tracker<span class="sub">points over the tournament</span></h2>
    <div class="chartbox">
      <svg viewBox="0 0 ${W} ${H}" class="chart" role="img" aria-label="Points over time">
        <line x1="${pad}" y1="${Y(0).toFixed(1)}" x2="${W - pad}" y2="${Y(0).toFixed(1)}" class="axis"/>
        <path d="${path("d")}" class="ln d"/>
        <path d="${path("n")}" class="ln n"/>
        ${dots("d")}${dots("n")}
      </svg>
      <div class="chart-legend"><span class="n">● ${aName}</span><span class="d">● ${bName}</span></div>
    </div></section>`;
}

/* ---- Group tables ---- */
function groupRow(r, i) {
  const owned = !!r.owner;
  const style = owned ? ` style="background:${r.color}14"` : "";
  const dot = owned ? `<span class="odot" style="background:${r.color}"></span>` : "";
  const gd = r.gd > 0 ? "+" + r.gd : r.gd;
  return `<div class="grow ${i < 2 ? "qual" : ""}"${style}>
    <span class="gpos">${r.position}</span>
    ${crestImg(r.crest, r.tla, "")}
    <span class="gname">${dot}${r.name}</span>
    <span class="gnum">${r.played}</span>
    <span class="gnum">${gd}</span>
    <span class="gpts">${r.points}</span>
  </div>`;
}
function groupCard(g) {
  return `<div class="gcard">
    <div class="ghead"><span class="gttl">${g.group}</span><span class="hc">P</span><span class="hc">GD</span><span class="hc">Pts</span></div>
    ${g.table.map(groupRow).join("")}
  </div>`;
}
function groupsSection(groups) {
  if (!groups || !groups.length) return "";
  const sorted = groups.slice().sort((a, b) => (b.hasTracked ? 1 : 0) - (a.hasTracked ? 1 : 0));
  return `<section class="block"><h2 class="sec"><span class="ico">🗂️</span> Group tables<span class="sub">all 12 · your teams highlighted</span></h2>
    <div class="gwrap">${sorted.map(groupCard).join("")}</div>
    <div class="legend"><b>P</b> played · <b>GD</b> goal difference · <b>Pts</b> points · green bar = top 2 (advance) · tinted rows are your teams.</div></section>`;
}

/* ---- Feeds ---- */
function tsideHtml(team, stake, right) {
  const ours = !!stake;
  const styl = ours ? ` style="--c:${stake.color}"` : "";
  const crest = crestImg(team.crest, team.tla, "");
  const nm = `<span class="nm">${team.name}</span>`;
  return `<span class="tside ${right ? "right" : ""} ${ours ? "ours" : ""}"${styl}>${right ? nm + crest : crest + nm}</span>`;
}
function stakeChip(s, live) {
  const c = s.color;
  const val = live ? "" : ` ${s.points > 0 ? "+" : ""}${s.points}`;
  return `<span class="stake" style="color:${c};border:1px solid ${c}66;background:${c}1f" title="${s.player} — ${s.team}"><b>${s.player[0]}</b>${val}</span>`;
}
function h2hLine(e) {
  if (!e.h2h) return "";
  const h = e.h2h;
  const hn = e.home.tla || e.home.name, an = e.away.tla || e.away.name;
  const hw = h.homeWins || 0, aw = h.awayWins || 0, dr = h.draws || 0;
  const wdl = (hw + aw + dr) > 0 ? ` · ${hn} ${hw}-${dr}-${aw} ${an}` : "";
  return `<span class="h2h-line">🔁 Head-to-head: ${h.numberOfMatches} recent meeting${h.numberOfMatches === 1 ? "" : "s"}${wdl} · ${h.totalGoals} goals</span>`;
}
function recentRow(e) {
  const p = fmtParts(e.utcDate);
  const live = e.status === "IN_PLAY" || e.status === "PAUSED";
  const hs = e.stakes.find(s => s.isHome), as = e.stakes.find(s => !s.isHome);
  const score = (e.scoreHome == null || e.scoreAway == null) ? "–" : `${e.scoreHome}–${e.scoreAway}`;
  let extra = "";
  if (e.duration === "PENALTY_SHOOTOUT" && e.penHome != null) extra = `pens ${e.penHome}–${e.penAway}`;
  else if (e.duration === "EXTRA_TIME") extra = "a.e.t.";
  else if (e.htHome != null && !live) extra = `HT ${e.htHome}–${e.htAway}`;
  const chips = e.stakes.map(s => stakeChip(s, live)).join("") + (e.headToHead ? `<span class="h2h" title="A match between your two teams">⚔</span>` : "");
  const refTip = e.referee && e.referee.name ? ` title="Referee: ${e.referee.name}${e.referee.nationality ? " (" + e.referee.nationality + ")" : ""}"` : "";
  return `<li class="frow"${refTip}>
    <span class="f-date">${p.wd} ${p.dm}<span class="f-stage">${prettyStage(e.stage, e.group)}</span></span>
    <span class="matchup">${tsideHtml(e.home, hs, false)}<span class="f-score ${live ? "live" : ""}">${score}${extra ? `<span class="sub2">${extra}</span>` : ""}</span>${tsideHtml(e.away, as, true)}</span>
    <span class="stakes">${chips}</span>
    ${h2hLine(e)}
  </li>`;
}
function upcomingRow(e) {
  const p = fmtParts(e.utcDate);
  const hs = e.stakes.find(s => s.isHome), as = e.stakes.find(s => !s.isHome);
  const chips = e.stakes.map(s => `<span class="stake" style="color:${s.color};border:1px solid ${s.color}66;background:${s.color}1f" title="${s.player} — ${s.team}"><b>${s.player[0]}</b></span>`).join("") + (e.headToHead ? `<span class="h2h" title="A match between your two teams">⚔</span>` : "");
  return `<li class="frow">
    <span class="f-date">${p.wd} ${p.dm}<span class="f-stage">${prettyStage(e.stage, e.group)}</span></span>
    <span class="matchup">${tsideHtml(e.home, hs, false)}<span class="f-time">${p.tm}</span>${tsideHtml(e.away, as, true)}</span>
    <span class="stakes">${chips}</span>
    ${h2hLine(e)}
  </li>`;
}
function toggleMore(id, btn) {
  const f = document.getElementById(id);
  const collapsed = f.classList.toggle("collapsed");
  const total = f.querySelectorAll(".frow").length;
  btn.textContent = collapsed ? `Show all ${total} ▾` : "Show fewer ▴";
}
function feedSection(title, icon, items, rowFn, emptyMsg, id) {
  if (!items.length) return `<section class="block"><h2 class="sec"><span class="ico">${icon}</span> ${title}</h2><div class="feedbox"><div class="empty">${emptyMsg}</div></div></section>`;
  const expandable = items.length > 7;
  const btn = expandable ? `<button class="toggle-more" onclick="toggleMore('${id}', this)">Show all ${items.length} ▾</button>` : "";
  const legend = items.some(e => e.headToHead) ? `<div class="legend">⚔ = a match between your two teams (Nicha's vs Daniele's)</div>` : "";
  return `<section class="block"><h2 class="sec"><span class="ico">${icon}</span> ${title}<span class="sub">${items.length}</span></h2>
    <div class="feedbox"><ul class="feed ${expandable ? "collapsed" : ""}" id="${id}">${items.map(rowFn).join("")}</ul>${btn}</div>${legend}</section>`;
}

/* ---- Golden Boot ---- */
function scorerRow(s, i) {
  const owned = !!s.owner;
  const style = owned ? ` style="background:${s.color}14"` : "";
  const dot = owned ? `<span class="odot" style="background:${s.color}"></span>` : "";
  return `<div class="srow"${style}>
    <span class="rank">${i + 1}</span>
    ${crestImg(s.teamCrest, s.teamTla, "")}
    <span class="who"><span class="pl">${dot}${s.name || ""}</span><span class="tm">${s.team || ""}${owned ? " · " + s.owner : ""}</span></span>
    <span class="g">${s.goals}</span>
  </div>`;
}
function scorersSection(scorers) {
  if (!scorers || !scorers.length) return "";
  return `<section class="block"><h2 class="sec"><span class="ico">👟</span> Golden Boot race<span class="sub">your players highlighted</span></h2>
    <div class="scorers">${scorers.slice(0, 12).map(scorerRow).join("")}</div></section>`;
}

/* ---- Countdown + confetti ---- */
function startCountdown(m) {
  const el = document.getElementById("cd");
  if (!el || !m || !m.utcDate) return;
  const target = new Date(m.utcDate).getTime();
  const label = m.headToHead ? "⚔ Next — your head-to-head" : "⏱️ Next match";
  function tick() {
    const diff = target - Date.now();
    let t;
    if (diff <= 0) t = "kicking off…";
    else {
      const d = Math.floor(diff / 86400000), h = Math.floor(diff / 3600000) % 24,
            mi = Math.floor(diff / 60000) % 60, s = Math.floor(diff / 1000) % 60;
      t = (d > 0 ? d + "d " : "") + String(h).padStart(2, "0") + ":" + String(mi).padStart(2, "0") + ":" + String(s).padStart(2, "0");
    }
    el.innerHTML = `<div class="cd-k">${label}</div><div class="cd-m">${m.home.name} vs ${m.away.name}</div><div class="cd-t">${t}</div>`;
  }
  tick();
  if (window._cdTimer) clearInterval(window._cdTimer);
  window._cdTimer = setInterval(tick, 1000);
}
function confetti(color) {
  const c = document.createElement("canvas");
  c.style.cssText = "position:fixed;inset:0;pointer-events:none;z-index:9999";
  c.width = innerWidth; c.height = innerHeight;
  document.body.appendChild(c);
  const ctx = c.getContext("2d");
  const cols = [color, "#ffffff", "#f5c451"];
  const P = Array.from({ length: 150 }, (_, i) => ({
    x: Math.random() * c.width, y: -10 - Math.random() * c.height * 0.35,
    vx: (Math.random() - 0.5) * 1.6, vy: 0.7 + Math.random() * 1.3,
    r: 4 + Math.random() * 5, rot: Math.random() * 6, vr: (Math.random() - 0.5) * 0.3,
    col: cols[i % cols.length],
  }));
  let frame = 0;
  (function anim() {
    ctx.clearRect(0, 0, c.width, c.height);
    for (const p of P) {
      p.x += p.vx + Math.sin(frame * 0.05 + p.rot) * 0.4; p.y += p.vy; p.vy = Math.min(p.vy + 0.012, 2.4); p.rot += p.vr;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.col; ctx.globalAlpha = Math.max(0, 1 - frame / 300);
      ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6); ctx.restore();
    }
    if (++frame < 300) requestAnimationFrame(anim); else c.remove();
  })();
}

let triviaTimer = null;
function startTrivia() {
  const el = document.getElementById("triviaText");
  if (!el) return;
  if (triviaTimer) clearInterval(triviaTimer);
  let i = Math.floor(Date.now() / 9000) % FACTS.length;
  el.textContent = FACTS[i];
  triviaTimer = setInterval(() => {
    i = (i + 1) % FACTS.length;
    el.style.opacity = 0;
    setTimeout(() => { el.textContent = FACTS[i]; el.style.opacity = 1; }, 300);
  }, 9000);
}

function render(data) {
  const players = data.players || [];
  const [a, b] = players;
  const keyOf = n => n.toLowerCase() === "nicha" ? "nicha" : "daniele";
  const lead = a.total === b.total ? null : (a.total > b.total ? a : b);
  const diff = Math.abs(a.total - b.total);
  const next = (data.upcoming || [])[0];

  const hero = `
    <div class="hero">
      <div class="side nicha ${lead === a ? "leader" : ""}">
        <div class="pname">${a.name}</div><div class="score">${a.total}</div>
        <div class="crowns">${lead === a ? "👑 leading" : ""}</div>
      </div>
      <div class="vs">VS</div>
      <div class="side daniele ${lead === b ? "leader" : ""}">
        <div class="pname">${b.name}</div><div class="score">${b.total}</div>
        <div class="crowns">${lead === b ? "👑 leading" : ""}</div>
      </div>
    </div>
    <div class="leadbar">${lead ? `<b>${lead.name}</b> leads by <b>${diff}</b> point${diff === 1 ? "" : "s"}` : `<b>All square</b> — it's a tie!`}</div>
    <div class="vibe">${vibe(lead, diff)}</div>
    ${towHtml(a, b)}
    ${tapeHtml(a, b)}
    ${next ? `<div class="countdown ${next.headToHead ? "h2h" : ""}" id="cd"></div>` : ""}
    <div class="rules-strip">
      <span class="rule win">Win <b>+3</b></span>
      <span class="rule draw">Draw <b>+1</b></span>
      <span class="rule loss">Loss <b>−1</b></span>
    </div>`;

  const standings = `<section class="block"><h2 class="sec"><span class="ico">📋</span> Standings</h2>
    <div class="grid">${panel(a, keyOf(a.name))}${panel(b, keyOf(b.name))}</div>
    <div class="legend">Each team's record is <b>W-L-D</b> (won-lost-drawn). Win +3 · Draw +1 · Loss −1.</div></section>`;

  const chart = leadChart(data.timeline || [], a.name, b.name);
  const groups = groupsSection(data.groups || []);
  const recent = feedSection("Recent results", "✅", data.recent || [], recentRow, "No results yet — kickoff soon!", "recentFeed");
  const upcoming = feedSection("Upcoming matches", "📅", data.upcoming || [], upcomingRow, "No upcoming fixtures.", "upcomingFeed");
  const scorers = scorersSection(data.scorers || []);

  const cur = data.curiosities || [];
  const stats = cur.map(c => `<div class="stat"><div class="si">${c.icon}</div><div class="sv">${c.value}</div><div class="sl">${c.label}</div></div>`).join("");
  const curiosities = `<section class="block"><h2 class="sec"><span class="ico">🎉</span> World Cup curiosities</h2>
    ${stats ? `<div class="stat-grid">${stats}</div>` : ""}
    <div class="trivia"><div class="ti">💡</div><div><div class="tk">Did you know?</div><div class="tt" id="triviaText">…</div></div></div></section>`;

  document.getElementById("app").innerHTML = hero + standings + chart + groups + recent + upcoming + scorers + curiosities;

  const anyLive = (data.recent || []).some(e => e.status === "IN_PLAY" || e.status === "PAUSED");
  document.getElementById("livePill").classList.toggle("show", anyLive);

  const u = new Date(data.updatedAt);
  document.getElementById("updated").textContent =
    "Updated " + u.toLocaleString(undefined, { day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" });

  startCountdown(next);
  startTrivia();
  if (lead && !window._confettiDone) {
    window._confettiDone = true;
    setTimeout(() => confetti(lead.color || "#ffffff"), 350);
  }
}

async function load() {
  try {
    const res = await fetch("./data.json?t=" + Date.now());
    if (!res.ok) throw new Error(res.status);
    render(await res.json());
  } catch (e) {
    document.getElementById("app").innerHTML =
      `<div class="state">Couldn't load scores yet (${e.message}).<br>The updater may not have run for the first time.</div>`;
  }
}
load();
setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
