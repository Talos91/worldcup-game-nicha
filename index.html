<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>World Cup 2026 · Nicha vs Daniele</title>
<style>
  :root {
    --bg: #0a0e1a; --bg2: #0f1830;
    --card: rgba(255, 255, 255, 0.04);
    --card-line: rgba(255, 255, 255, 0.09);
    --text: #eef2ff; --muted: #93a0c4;
    --nicha: #ff5d8f; --daniele: #3da5ff;
    --win: #2ecc71; --draw: #f5c451; --loss: #ff5c5c;
    --shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(61,165,255,0.18), transparent 60%),
      radial-gradient(1000px 600px at 90% 0%, rgba(255,93,143,0.16), transparent 55%),
      linear-gradient(160deg, var(--bg2), var(--bg));
    background-attachment: fixed; min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 28px 18px 64px; }

  header.top { text-align: center; margin-bottom: 20px; }
  header.top .kicker { letter-spacing: .28em; text-transform: uppercase; font-size: 12px; color: var(--muted); font-weight: 700; }
  header.top h1 { margin: 6px 0 0; font-size: clamp(26px, 5vw, 40px); font-weight: 800; }
  .live-pill { display:none; align-items:center; gap:7px; margin:12px auto 0; width:fit-content; padding:5px 13px;
    border-radius:999px; background:rgba(255,92,92,.14); color:#ff8a8a; font-weight:700; font-size:13px; border:1px solid rgba(255,92,92,.4); }
  .live-pill.show { display:flex; }
  .live-pill .dot { width:8px; height:8px; border-radius:50%; background:#ff5c5c; animation:pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

  /* Hero */
  .hero { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:10px; padding:26px 20px;
    border-radius:22px; background:var(--card); border:1px solid var(--card-line); box-shadow:var(--shadow); }
  .side { text-align:center; padding:6px 4px; border-radius:16px; transition:background .3s; }
  .side .pname { font-size:clamp(18px,4vw,26px); font-weight:800; }
  .side .score { font-size:clamp(54px,13vw,92px); font-weight:900; line-height:.95; margin:2px 0; }
  .side.nicha .pname { color:var(--nicha); } .side.daniele .pname { color:var(--daniele); }
  .side.nicha .score { text-shadow:0 6px 30px rgba(255,93,143,.35); }
  .side.daniele .score { text-shadow:0 6px 30px rgba(61,165,255,.35); }
  .side .crowns { font-size:13px; color:var(--muted); min-height:18px; }
  .side.leader { background:rgba(255,255,255,.05); }
  .vs { font-weight:900; color:var(--muted); font-size:20px; opacity:.7; }
  .leadbar { text-align:center; margin:14px auto 16px; font-weight:700; font-size:15px; color:var(--muted); }
  .leadbar b { color:var(--text); }

  /* Scoring rules strip */
  .rules-strip { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:0 auto 8px; }
  .rule { display:flex; align-items:center; gap:7px; padding:6px 14px; border-radius:999px; background:var(--card);
    border:1px solid var(--card-line); font-weight:700; font-size:13px; color:var(--muted); }
  .rule b { font-size:14px; color:var(--text); }
  .rule.win b{color:var(--win)} .rule.draw b{color:var(--draw)} .rule.loss b{color:var(--loss)}

  /* Section blocks */
  section.block { margin-top:30px; }
  h2.sec { display:flex; align-items:center; gap:9px; margin:0 0 14px; font-size:18px; font-weight:800; }
  h2.sec .ico { font-size:20px; }
  h2.sec .sub { margin-left:auto; color:var(--muted); font-weight:600; font-size:13px; }

  /* Standings */
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  .panel h3 { display:flex; align-items:baseline; gap:10px; justify-content:space-between; margin:0 0 11px; font-size:15px; font-weight:800; }
  .panel.nicha h3 .nm { color:var(--nicha); } .panel.daniele h3 .nm { color:var(--daniele); }
  .panel h3 .tot { font-size:13px; color:var(--muted); font-weight:700; }
  .team { background:var(--card); border:1px solid var(--card-line); border-radius:14px; padding:11px 13px; margin-bottom:10px; }
  .team-head { display:flex; align-items:center; gap:10px; }
  .crest { width:28px; height:28px; object-fit:contain; border-radius:5px; background:rgba(255,255,255,.9); padding:2px; flex:none; }
  .txt { display:inline-flex; align-items:center; justify-content:center; font-weight:800; color:#0a0e1a; background:#d7def5; border-radius:4px; font-size:10px; }
  .crest.txt { width:28px; height:28px; }
  .team-name { font-weight:700; font-size:14.5px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .form { display:flex; gap:4px; flex:none; }
  .form .fd { width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,.13); }
  .form .fd.W{background:var(--win)} .form .fd.D{background:var(--draw)} .form .fd.L{background:var(--loss)}
  .record { font-size:12px; color:var(--muted); font-weight:600; flex:none; }
  .pts-badge { padding:3px 10px; border-radius:999px; font-weight:800; font-size:14px; background:rgba(255,255,255,.08); flex:none; }
  .pts-badge.pos { color:var(--win); background:rgba(46,204,113,.14); }
  .pts-badge.neg { color:var(--loss); background:rgba(255,92,92,.14); }
  .pts-badge.zero { color:var(--muted); }

  /* Feeds (recent / upcoming) */
  .feed { background:var(--card); border:1px solid var(--card-line); border-radius:16px; overflow:hidden; }
  .frow { display:grid; grid-template-columns:80px 1fr auto; align-items:center; gap:10px; padding:11px 13px; border-top:1px solid rgba(255,255,255,.06); }
  .frow:first-child { border-top:none; }
  .f-date { color:var(--muted); font-size:11.5px; line-height:1.3; }
  .f-stage { display:block; opacity:.65; font-size:9.5px; text-transform:uppercase; letter-spacing:.04em; margin-top:1px; }
  .matchup { display:flex; align-items:center; gap:8px; min-width:0; }
  .tside { display:flex; align-items:center; gap:7px; min-width:0; flex:1; }
  .tside.right { justify-content:flex-end; }
  .tside img { width:20px; height:20px; object-fit:contain; border-radius:3px; background:rgba(255,255,255,.85); flex:none; }
  .tside .txt { width:20px; height:20px; }
  .tside .nm { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:13.5px; }
  .tside.ours .nm { font-weight:800; }
  .tside.ours .nm::before { content:''; display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--c); margin-right:6px; vertical-align:middle; }
  .f-score { font-variant-numeric:tabular-nums; font-weight:800; font-size:15px; min-width:46px; text-align:center; flex:none; }
  .f-score.live { color:#ff8a8a; }
  .f-time { color:var(--muted); font-weight:700; font-size:12.5px; min-width:46px; text-align:center; flex:none; }
  .stakes { display:flex; gap:6px; flex:none; }
  .stake { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:999px; font-size:12px; font-weight:800; }
  .stake b { font-weight:900; }
  .h2h { color:var(--draw); font-size:11px; font-weight:800; margin-left:2px; }
  .more { padding:10px 13px; color:var(--muted); font-size:12.5px; text-align:center; border-top:1px solid rgba(255,255,255,.06); }
  .empty { padding:24px; text-align:center; color:var(--muted); font-size:13px; }

  /* Curiosities */
  .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; }
  .stat { background:var(--card); border:1px solid var(--card-line); border-radius:14px; padding:14px; }
  .stat .si { font-size:20px; } .stat .sv { font-size:17px; font-weight:800; margin-top:7px; }
  .stat .sl { color:var(--muted); font-size:12px; margin-top:2px; font-weight:600; }
  .trivia { margin-top:14px; display:flex; gap:13px; align-items:flex-start; padding:16px 18px; border-radius:16px;
    background:linear-gradient(120deg, rgba(245,196,81,.10), rgba(61,165,255,.08)); border:1px solid var(--card-line); }
  .trivia .ti { font-size:22px; flex:none; }
  .trivia .tk { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); font-weight:800; }
  .trivia .tt { margin-top:4px; font-size:14.5px; line-height:1.5; transition:opacity .3s; }

  footer { margin-top:34px; text-align:center; color:var(--muted); font-size:12.5px; line-height:1.7; }
  footer a { color:var(--muted); }
  .state { text-align:center; padding:60px 20px; color:var(--muted); }

  @media (max-width:720px) {
    .grid { grid-template-columns:1fr; }
    .hero { padding:20px 12px; }
    .frow { grid-template-columns:66px 1fr auto; gap:8px; }
    .tside .nm { font-size:12.5px; }
    .stakes { flex-direction:column; gap:4px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="kicker">FIFA World Cup 2026</div>
      <h1>🏆 Nicha vs Daniele</h1>
      <div class="live-pill" id="livePill"><span class="dot"></span> Match in play</div>
    </header>

    <div id="app"><div class="state">Loading the scoreboard…</div></div>

    <footer>
      <div id="updated"></div>
      <div>Data: football-data.org · refreshes automatically</div>
    </footer>
  </div>

<script>
const FACTS = [
  "2026 is the first 48-team World Cup — and the first hosted by three nations: the USA, Canada and Mexico.",
  "Brazil are the only side to have played in every World Cup, and hold the most titles with five.",
  "Just Fontaine's 13 goals at the 1958 World Cup is still the most ever in a single tournament.",
  "Miroslav Klose is the all-time top World Cup scorer with 16 goals across four tournaments.",
  "The fastest World Cup goal was scored by Hakan Şükür for Turkey in 2002 — after just 11 seconds.",
  "Germany 7–1 Brazil at the 2014 semi-final is the most lopsided result that late in a World Cup.",
  "The highest-scoring World Cup match was Austria 7–5 Switzerland in 1954 — twelve goals.",
  "Only eight different nations have ever won the World Cup.",
  "The trophy is solid 18-carat gold and weighs a little over 6 kilograms.",
  "In 1950's 'Maracanazo', Uruguay stunned Brazil in front of a crowd of roughly 200,000.",
];

function fmtParts(iso) {
  if (!iso) return { wd:"", dm:"", tm:"" };
  const d = new Date(iso);
  return {
    wd: d.toLocaleDateString(undefined, { weekday:"short" }),
    dm: d.toLocaleDateString(undefined, { day:"numeric", month:"short" }),
    tm: d.toLocaleTimeString(undefined, { hour:"2-digit", minute:"2-digit" }),
  };
}
function crestImg(url, tla, cls) {
  if (url) return `<img class="${cls}" src="${url}" alt="${tla||''}" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'${cls} txt',textContent:'${tla||''}'}))">`;
  return `<span class="${cls} txt">${tla||""}</span>`;
}
function prettyStage(stage, group) {
  if (group) return group.replace("GROUP_", "Group ");
  const map = { LAST_32:"Round of 32", LAST_16:"Round of 16", ROUND_OF_16:"Round of 16",
    QUARTER_FINALS:"Quarter-final", SEMI_FINALS:"Semi-final", THIRD_PLACE:"3rd place", FINAL:"Final" };
  if (!stage) return "";
  return map[stage] || stage.replace(/_/g," ").toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

/* ---- Standings ---- */
function formDots(t) {
  const counted = (t.matches || []).filter(m => m.counted);
  if (!counted.length) return "";
  return `<span class="form">${counted.slice(-5).map(m => `<span class="fd ${m.result}"></span>`).join("")}</span>`;
}
function teamCard(t) {
  const cls = t.points > 0 ? "pos" : (t.points < 0 ? "neg" : "zero");
  return `<div class="team"><div class="team-head">
    ${crestImg(t.crest, t.tla, "crest")}
    <div class="team-name">${t.name}</div>
    ${formDots(t)}
    <div class="record">${t.w}-${t.d}-${t.l}</div>
    <div class="pts-badge ${cls}">${t.points > 0 ? "+" : ""}${t.points}</div>
  </div></div>`;
}
function panel(p, key) {
  return `<section class="panel ${key}">
    <h3><span class="nm">${p.name}</span><span class="tot">${p.total > 0 ? "+" : ""}${p.total} pts</span></h3>
    ${p.teams.map(teamCard).join("")}
  </section>`;
}

/* ---- Feeds ---- */
function tsideHtml(team, stake, right) {
  const ours = !!stake;
  const styl = ours ? ` style="--c:${stake.color}"` : "";
  const crest = crestImg(team.crest, team.tla, "");
  const nm = `<span class="nm">${team.name}</span>`;
  const inner = right ? `${nm}${crest}` : `${crest}${nm}`;
  return `<span class="tside ${right ? "right" : ""} ${ours ? "ours" : ""}"${styl}>${inner}</span>`;
}
function stakeChip(s, live) {
  const c = s.color;
  const val = live ? "" : ` ${s.points > 0 ? "+" : ""}${s.points}`;
  return `<span class="stake" style="color:${c};border:1px solid ${c}66;background:${c}1f" title="${s.player} — ${s.team}"><b>${s.player[0]}</b>${val}</span>`;
}
function recentRow(e) {
  const p = fmtParts(e.utcDate);
  const live = e.status === "IN_PLAY" || e.status === "PAUSED";
  const hs = e.stakes.find(s => s.isHome), as = e.stakes.find(s => !s.isHome);
  const score = (e.scoreHome == null || e.scoreAway == null) ? "–" : `${e.scoreHome}–${e.scoreAway}`;
  const chips = e.stakes.map(s => stakeChip(s, live)).join("") + (e.headToHead ? `<span class="h2h">⚔</span>` : "");
  return `<li class="frow">
    <span class="f-date">${p.wd} ${p.dm}<span class="f-stage">${prettyStage(e.stage, e.group)}</span></span>
    <span class="matchup">
      ${tsideHtml(e.home, hs, false)}
      <span class="f-score ${live ? "live" : ""}">${score}</span>
      ${tsideHtml(e.away, as, true)}
    </span>
    <span class="stakes">${chips}</span>
  </li>`;
}
function upcomingRow(e) {
  const p = fmtParts(e.utcDate);
  const hs = e.stakes.find(s => s.isHome), as = e.stakes.find(s => !s.isHome);
  const chips = e.stakes.map(s => `<span class="stake" style="color:${s.color};border:1px solid ${s.color}66;background:${s.color}1f" title="${s.player} — ${s.team}"><b>${s.player[0]}</b></span>`).join("") + (e.headToHead ? `<span class="h2h">⚔</span>` : "");
  return `<li class="frow">
    <span class="f-date">${p.wd} ${p.dm}<span class="f-stage">${prettyStage(e.stage, e.group)}</span></span>
    <span class="matchup">
      ${tsideHtml(e.home, hs, false)}
      <span class="f-time">${p.tm}</span>
      ${tsideHtml(e.away, as, true)}
    </span>
    <span class="stakes">${chips}</span>
  </li>`;
}
function feedSection(title, icon, items, rowFn, emptyMsg, limit) {
  const shown = items.slice(0, limit);
  const more = items.length - shown.length;
  const body = items.length
    ? `<ul class="feed">${shown.map(rowFn).join("")}${more > 0 ? `<li class="more">+${more} more ${more === 1 ? "match" : "matches"}</li>` : ""}</ul>`
    : `<div class="feed"><div class="empty">${emptyMsg}</div></div>`;
  return `<section class="block"><h2 class="sec"><span class="ico">${icon}</span> ${title}<span class="sub">${items.length}</span></h2>${body}</section>`;
}

/* ---- Curiosities ---- */
let triviaTimer = null;
function startTrivia() {
  const el = document.getElementById("triviaText");
  if (!el) return;
  if (triviaTimer) clearInterval(triviaTimer);
  let i = Math.floor(Date.now() / 9000) % FACTS.length;
  el.textContent = FACTS[i];
  triviaTimer = setInterval(() => {
    i = (i + 1) % FACTS.length;
    el.style.opacity = 0;
    setTimeout(() => { el.textContent = FACTS[i]; el.style.opacity = 1; }, 300);
  }, 9000);
}

function render(data) {
  const players = data.players || [];
  const [a, b] = players;
  const keyOf = n => n.toLowerCase() === "nicha" ? "nicha" : "daniele";
  const lead = a.total === b.total ? null : (a.total > b.total ? a : b);
  const diff = Math.abs(a.total - b.total);

  const hero = `
    <div class="hero">
      <div class="side nicha ${lead === a ? "leader" : ""}">
        <div class="pname">${a.name}</div><div class="score">${a.total}</div>
        <div class="crowns">${lead === a ? "👑 leading" : ""}</div>
      </div>
      <div class="vs">VS</div>
      <div class="side daniele ${lead === b ? "leader" : ""}">
        <div class="pname">${b.name}</div><div class="score">${b.total}</div>
        <div class="crowns">${lead === b ? "👑 leading" : ""}</div>
      </div>
    </div>
    <div class="leadbar">${lead ? `<b>${lead.name}</b> leads by <b>${diff}</b> point${diff === 1 ? "" : "s"}` : `<b>All square</b> — it's a tie!`}</div>
    <div class="rules-strip">
      <span class="rule win">Win <b>+3</b></span>
      <span class="rule draw">Draw <b>+1</b></span>
      <span class="rule loss">Loss <b>−1</b></span>
    </div>`;

  const standings = `<section class="block"><h2 class="sec"><span class="ico">📋</span> Standings</h2>
    <div class="grid">${panel(a, keyOf(a.name))}${panel(b, keyOf(b.name))}</div></section>`;

  const recent = feedSection("Recent results", "✅", data.recent || [], recentRow, "No results yet — kickoff soon!", 10);
  const upcoming = feedSection("Upcoming matches", "📅", data.upcoming || [], upcomingRow, "No upcoming fixtures.", 10);

  const cur = data.curiosities || [];
  const stats = cur.map(c => `<div class="stat"><div class="si">${c.icon}</div><div class="sv">${c.value}</div><div class="sl">${c.label}</div></div>`).join("");
  const curiosities = `<section class="block"><h2 class="sec"><span class="ico">🎉</span> World Cup curiosities</h2>
    ${stats ? `<div class="stat-grid">${stats}</div>` : ""}
    <div class="trivia"><div class="ti">💡</div><div><div class="tk">Did you know?</div><div class="tt" id="triviaText">…</div></div></div>
  </section>`;

  document.getElementById("app").innerHTML = hero + standings + recent + upcoming + curiosities;

  const anyLive = (data.recent || []).some(e => e.status === "IN_PLAY" || e.status === "PAUSED");
  document.getElementById("livePill").classList.toggle("show", anyLive);

  const u = new Date(data.updatedAt);
  document.getElementById("updated").textContent =
    "Updated " + u.toLocaleString(undefined, { day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" });

  startTrivia();
}

async function load() {
  try {
    const res = await fetch("./data.json?t=" + Date.now());
    if (!res.ok) throw new Error(res.status);
    render(await res.json());
  } catch (e) {
    document.getElementById("app").innerHTML =
      `<div class="state">Couldn't load scores yet (${e.message}).<br>The updater may not have run for the first time.</div>`;
  }
}
load();
setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
